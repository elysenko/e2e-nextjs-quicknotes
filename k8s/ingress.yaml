apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e2e-nextjs-quicknotes
  namespace: colossus-e2e-nextjs-quicknotes
  labels:
    app: e2e-nextjs-quicknotes
    managed-by: colossus
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: ubuntu.desmana-truck.ts.net
      http:
        paths:
          - path: /e2e-nextjs-quicknotes
            pathType: Prefix
            backend:
              service:
                name: e2e-nextjs-quicknotes
                port:
                  number: 80
  tls:
    - hosts:
        - ubuntu.desmana-truck.ts.net
      secretName: colossus-shared-tls
