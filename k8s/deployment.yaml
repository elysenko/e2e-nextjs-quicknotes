apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-nextjs-quicknotes
  namespace: colossus-e2e-nextjs-quicknotes
  labels:
    app: e2e-nextjs-quicknotes
    managed-by: colossus
spec:
  replicas: 1
  # Recreate (NOT the default RollingUpdate): the per-project namespace has a hard
  # memory ResourceQuota. Kill-before-create avoids the 2x-quota spike.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: e2e-nextjs-quicknotes
  template:
    metadata:
      labels:
        app: e2e-nextjs-quicknotes
    spec:
      hostAliases:
        - ip: "192.168.50.250"
          hostnames:
            - "ubuntu.desmana-truck.ts.net"
      containers:
        - name: app
          image: ubuntu:30500/e2e-nextjs-quicknotes:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: app-secrets
                optional: true
